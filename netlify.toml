[build]
  publish = "dist"
  command = "yarn build"

# API proxy to avoid CORS issues (matching Vite dev server proxy)
# Specific API endpoints only - don't catch /miners/details or /miners/repository
[[redirects]]
  from = "/dash/*"
  to = "https://api.gittensor.io/dash/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/miners/all/*"
  to = "https://api.gittensor.io/miners/all/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/miners/stats/*"
  to = "https://api.gittensor.io/miners/stats/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/miners/:id/prs"
  to = "https://api.gittensor.io/miners/:id/prs"
  status = 200
  force = true

[[redirects]]
  from = "/miners/:id/stats"
  to = "https://api.gittensor.io/miners/:id/stats"
  status = 200
  force = true

# Edge Functions for OG image generation and meta tag injection
[[edge_functions]]
  path = "/og-image"
  function = "og-image"

[[edge_functions]]
  path = "/miners/details"
  function = "og-meta-tags"

[[edge_functions]]
  path = "/miners/repository"
  function = "og-meta-tags"

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
