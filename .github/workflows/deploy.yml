name: Deploy

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

env:
  CONTAINER_NAME: gt-ui

jobs:
  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'test' }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy-key.pem
          chmod 600 ~/.ssh/deploy-key.pem
          cat >> ~/.ssh/config <<END
          Host my-vps
            HostName $SSH_IP
            User $SSH_USER
            IdentityFile ~/.ssh/deploy-key.pem
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_IP: ${{ secrets.SSH_IP }}

      - name: Deploy site
        id: deploy
        run: ssh my-vps '~/redeploy-site.sh'

      - name: Print Container Status
        id: printStatus
        run: |
          echo "Checking container status..."
          ssh my-vps 'docker ps'

          echo "Verifying ${{ env.CONTAINER_NAME }} is running..."
          if ssh my-vps "docker ps --format '{{.Names}}' | grep -q '^${{ env.CONTAINER_NAME }}$'"; then
            echo "Container ${{ env.CONTAINER_NAME }} is running"
          else
            echo "Container ${{ env.CONTAINER_NAME }} is NOT running"
            exit 1
          fi

      - name: Refresh Repository weights
        id: weight-refresh
        run: ssh my-vps '~/update-repository-weights.sh'

      # for notifying of deploy or statusfailure
      - name: Notify Deploy Failure
        if: failure()
        run: curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" -d "content=💩 Deployment failed on ${{ github.ref == 'refs/heads/main' && 'PROD' || 'TEST' }} environment"

      - name: Discord Success Post
        if: success()
        run: curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" -d "content=🚀 Deployment successful on ${{ github.ref == 'refs/heads/main' && 'PROD' || 'TEST' }} environment"
